kind = "web"
previewPath = "/"
title = "Postiz Clone"
version = "1.0.0"
id = "artifacts/postiz-clone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18332

[services.development]
run = "pnpm --filter @workspace/postiz-clone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/postiz-clone", "run", "build" ]
publicDir = "artifacts/postiz-clone/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18332"
BASE_PATH = "/"
